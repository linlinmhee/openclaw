services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    dockerCommand: node openclaw.mjs gateway --allow-unconfigured --bind 0.0.0.0 --port ${PORT:-8080}
    healthCheckPath: /health
    envVars:
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: NODE_OPTIONS
        value: "--max-old-space-size=420"
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
